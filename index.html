
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#B2DFDB">
    <title>মুক্ত বিলাস</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #FDFCF0 0%, #E0F2F1 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #2D3748;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
            /* Support for mobile safe areas */
            padding-top: var(--safe-top);
        }
        .glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .premium-shadow {
            box-shadow: 0 10px 30px -10px rgba(77, 182, 172, 0.15);
        }
        .accent-mint { color: #4DB6AC; }
        .bg-accent-mint { background-color: #B2DFDB; }
        .bg-accent-blue { background-color: #B3E5FC; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Ensure navigation doesn't hide behind system bars */
        .safe-pb {
            padding-bottom: calc(1rem + var(--safe-bottom));
        }
        .safe-mb {
            margin-bottom: var(--safe-bottom);
        }
    </style>
